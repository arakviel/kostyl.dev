name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.22.0
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Cache node modules
              id: cache-nodemodules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-pnpm-v1-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-v1-

            - name: Install dependencies
              if: steps.cache-nodemodules.outputs.cache-hit != 'true'
              run: pnpm install --frozen-lockfile

            - name: Rebuild better-sqlite3 for Linux
              if: steps.cache-nodemodules.outputs.cache-hit != 'true'
              run: |
                  SQLITE_DIR=$(find node_modules/.pnpm -maxdepth 3 -name "better-sqlite3" -type d | grep "node_modules/better-sqlite3$" | head -1)
                  if [ -n "$SQLITE_DIR" ]; then
                      echo "Found better-sqlite3 at: $SQLITE_DIR"
                      cd "$SQLITE_DIR"
                      npx node-gyp rebuild
                  else
                      echo "better-sqlite3 not found, skipping rebuild"
                  fi

            - name: Generate Static Site
              run: pnpm run generate

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .output/public

    deploy:
        needs: build
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
